<body>
    <header>
        <div class="logo">MEET EXPERIENCED TUTORS ACROSS ALL SUBJECTS AND GRADE LEVELS</div>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>

            <a href="https://www.linkedin.com/in/enoch-micah-433160127" target="_blank">LinkedIn</a>
            <a href="https://github.com/Enson44" target="_blank">GitHub</a>
        </nav>
    </header>
    <section id="contact">
        <h2>Get In Touch</h2>
        <form id="contactForm" action="https://formspree.io/f/xvznyoww" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <select name="service_type" required>
                <option value="" disabled selected>What can we help you with today?</option>
                <option value="Tutoring">I need a Mathematics Tutor</option>
                <option value="Tutoring">I need an English Language Tutor </option>
                <option value="Tutoring">I am in need of a Physics Tutor</option>
                <option value="Tutoring">I am in need of a Chemistry Tutor</option>
                <option value="Tutoring">I am looking for an elementary Maths and English Tutor.</option>
                <option value="Tutoring">I'm looking for a STEM Tutor(Math, Physics, Chemistry).</option>
                <option value="Web Development">I need a personal business Website.</option>
                <option value="Data Science">I need a Data Science consultation</option>
                <option value="Tutoring">I need a programming Tutor(HTML, CSS, JavaScript, Python)</option>
                <option value="Tutoring">Other Subjects</option>
                
            </select>
            <textarea name="message" placeholder="Tell us more about what you want from us." rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <div id="status"></div>
    </section>
    <script src="script.js"></script>
